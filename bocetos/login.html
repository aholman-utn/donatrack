<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonaTrack - Iniciar Sesión</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: var(--card); padding: 3rem; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; }
        .login-container h1 { color: var(--primary); text-align: center; margin-bottom: 0.5rem; }
        .login-container > p { text-align: center; color: var(--text-secondary); margin-bottom: 2rem; }
        .links { text-align: center; margin-top: 1.5rem; }
        .links a { color: var(--primary); text-decoration: none; font-size: 0.9rem; }
        .back { display: block; text-align: center; margin-top: 1rem; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; }
        .back:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>💚 DonaTrack</h1>
        <p>Iniciá sesión para continuar</p>
        <form>
            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" placeholder="tu@email.com">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;padding:0.75rem;">Iniciar Sesión</button>
        </form>
        <div class="links">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>
        <a href="registro.html" class="back">¿No tenés cuenta? Registrate</a>
        <a href="index.html" class="back">← Volver al inicio</a>
    </div>
</body>
</html>
